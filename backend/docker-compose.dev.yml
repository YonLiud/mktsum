name: mktsum-backend-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mktsum
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
  backend:
    build: .
    restart: "no"
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mktsum
      PORT: 5000
    volumes:
      - ./drizzle:/app/drizzle
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "--eval", "await fetch('http://localhost:5000').catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  seeder:
    image: curlimages/curl:latest
    restart: "no"
    volumes:
      - ./seed-dev.sh:/seed-dev.sh
    command: sh /seed-dev.sh
    environment:
      BASE: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
