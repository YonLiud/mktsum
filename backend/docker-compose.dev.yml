version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mktsum_postgres_dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mktsum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mktsum_dev

networks:
  mktsum_dev:
    driver: bridge

volumes:
  postgres_data_dev:
