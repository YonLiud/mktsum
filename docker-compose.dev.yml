name: mktsum-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mktsum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mktsum}
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mktsum}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mktsum}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mktsum}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:5000/').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: "no"
    command: ["tail", "-f", "/dev/null"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BACKEND_URL: http://backend:5000
      NOTIFIER_URL: http://notifier:3001
      NEWS_PER_TICKER: ${NEWS_PER_TICKER:-10}
      FAILURE_NTFY_TOPIC: ${FAILURE_NTFY_TOPIC:-yonsnewsletter}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_dev:
