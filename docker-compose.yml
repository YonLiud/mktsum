services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4173:80"
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mktsum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mktsum}
    volumes:
      - /srv/mktsum_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mktsum}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mktsum}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mktsum}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-https://mktsum.yxnliu.net}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    command: ["tail", "-f", "/dev/null"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BACKEND_URL: http://backend:5000
      NEWS_PER_TICKER: ${NEWS_PER_TICKER:-10}
    depends_on:
      - backend
    networks:
      - internal

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    depends_on:
      - engine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --docker
    labels:
      ofelia.job-exec.engine-daily.schedule: "${ENGINE_SCHEDULE:-0 7 * * *}"
      ofelia.job-exec.engine-daily.container: "mktsum-engine-1"
      ofelia.job-exec.engine-daily.command: "bun src/main.ts"
      ofelia.job-exec.engine-daily.no-overlap: "true"
    networks:
      - internal

networks:
  internal:
    driver: bridge
