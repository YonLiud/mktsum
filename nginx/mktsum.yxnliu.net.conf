upstream backend {
    server 127.0.0.1:5000;
}

upstream frontend {
    server 127.0.0.1:3000;
}

server {
    server_name mktsum.yxnliu.net;

    # block internal routes from public internet
    location /internal {
        return 403;
    }

    # proxy API to backend
    location /v1/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # serve frontend SPA
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/mktsum.yxnliu.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mktsum.yxnliu.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = mktsum.yxnliu.net) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name mktsum.yxnliu.net;
    return 404;
}
