services:
  frontend:
    image: mktsum-frontend:staging
    networks:
      - internal
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mktsum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mktsum_staging}
    volumes:
      - /srv/mktsum_data/postgres_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mktsum}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  backend:
    image: mktsum-backend:staging
    ports:
      - "127.0.0.1:5001:5000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mktsum}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mktsum_staging}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-https://dev.mktsum.yxnliu.net}
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:5000/').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  notifier:
    image: mktsum-notifier:staging
    ports:
      - "127.0.0.1:3002:3001"
    environment:
      BACKEND_URL: http://backend:5000
      FRONTEND_URL: ${FRONTEND_URL:-https://dev.mktsum.yxnliu.net}
    networks:
      - internal
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  ofelia:
    image: mcuadros/ofelia:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --docker
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    labels:
      ofelia.job-run.engine-staging-daily.schedule: "${ENGINE_SCHEDULE:-0 0 7 * * *}"
      ofelia.job-run.engine-staging-daily.image: "mktsum-engine:staging"
      ofelia.job-run.engine-staging-daily.network: "mktsum-staging_internal"
      ofelia.job-run.engine-staging-daily.environment: "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY},BACKEND_URL=http://backend:5000,NOTIFIER_URL=http://notifier:3001,NEWS_PER_TICKER=${NEWS_PER_TICKER:-10},FAILURE_NTFY_TOPIC=${FAILURE_NTFY_TOPIC:-yonsnewsletter},LLM_CONCURRENCY=${LLM_CONCURRENCY:-5}"
      ofelia.job-run.engine-staging-daily.no-overlap: "true"

networks:
  internal:
    driver: overlay
    attachable: true
